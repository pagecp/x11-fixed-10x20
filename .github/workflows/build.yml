name: Build and validate font

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y xfonts-utils fontconfig
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: make all
      - run: fc-scan fonts/ttf/X11Fixed10x20-Regular.ttf
      - uses: actions/upload-artifact@v4
        with:
          name: X11-Fixed-10x20
          path: |
            fonts/ttf/Fixed20-Original.ttf
            fonts/ttf/X11Fixed10x20-Regular.ttf
            specimens/*.png
